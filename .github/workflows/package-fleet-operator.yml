name: fleet-operator

on:
  push:
    paths:
      - 'fleet-operator/**'
      - '.github/workflows/package-fleet-operator.yml'
  pull_request:
    paths:
      - 'fleet-operator/**'
      - '.github/workflows/package-fleet-operator.yml'

defaults:
  run:
    working-directory: fleet-operator

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ctype, json, mbstring, openssl, pdo
          coverage: none

      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit
